{{- if .Values.httpRoute.enabled }}
{{- if not .Values.httpRoute.hostname }}
{{- fail "httpRoute.hostname is required when httpRoute.enabled=true" }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "hello-world.fullname" . }}
  labels:
    {{- include "hello-world.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.httpRoute.gateway.name | quote }}
      namespace: {{ .Values.httpRoute.gateway.namespace | quote }}
  hostnames:
    - {{ .Values.httpRoute.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.path | default "/" | quote }}
      backendRefs:
        - kind: Service
          name: {{ include "hello-world.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
