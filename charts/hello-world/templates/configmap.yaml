apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hello-world.fullname" . }}-content
  labels:
    {{- include "hello-world.labels" . | nindent 4 }}
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>{{ .Values.page.title | html }}</title>
      <style>
        :root { color-scheme: light dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f172a; color: #f8fafc; }
        main { width: min(680px, calc(100vw - 32px)); }
        h1 { margin: 0 0 16px; font-size: clamp(2rem, 6vw, 4rem); line-height: 1; }
        p { margin: 0; color: #cbd5e1; font-size: 1.125rem; line-height: 1.7; }
        .mark { width: 72px; height: 6px; margin-bottom: 28px; background: {{ .Values.page.accentColor }}; border-radius: 999px; }
      </style>
    </head>
    <body>
      <main>
        <div class="mark"></div>
        <h1>{{ .Values.page.heading | html }}</h1>
        <p>{{ .Values.page.body | html }}</p>
      </main>
    </body>
    </html>
