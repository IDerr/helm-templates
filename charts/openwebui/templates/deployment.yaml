apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openwebui.fullname" . }}
  labels:
    {{- include "openwebui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "openwebui.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "openwebui.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: openwebui
          image: {{ include "openwebui.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            # Keep the auto-generated session secret inside the data PVC so it
            # survives restarts (the default path /app/backend is not writable
            # for the non-root user).
            - name: WEBUI_SECRET_KEY_FILE
              value: /app/backend/data/.webui_secret_key
            # Python/HF caches try to write under $HOME; point it at the tmp
            # emptyDir instead of the image's /root.
            - name: HOME
              value: /tmp
            - name: ANONYMIZED_TELEMETRY
              value: "false"
            - name: SCARF_NO_ANALYTICS
              value: "true"
            - name: DO_NOT_TRACK
              value: "true"
            {{- if .Values.openwebui.openaiApiKey }}
            - name: OPENAI_API_BASE_URL
              value: {{ .Values.openwebui.openaiBaseUrl | quote }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openwebui.fullname" . }}
                  key: openai-api-key
            {{- else }}
            - name: ENABLE_OPENAI_API
              value: "false"
            {{- end }}
            {{- if .Values.openwebui.ollamaBaseUrl }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.openwebui.ollamaBaseUrl | quote }}
            {{- else }}
            - name: ENABLE_OLLAMA_API
              value: "false"
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # First boot runs DB migrations and warms caches — be generous.
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "openwebui.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
