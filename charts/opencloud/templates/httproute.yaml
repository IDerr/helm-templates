{{- if .Values.httpRoute.enabled }}
{{- if not .Values.httpRoute.hostname }}
{{- fail "httpRoute.hostname is required when httpRoute.enabled=true" }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "opencloud.fullname" . }}
  labels:
    {{- include "opencloud.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.httpRoute.gateway.name | quote }}
      namespace: {{ .Values.httpRoute.gateway.namespace | quote }}
  hostnames:
    - {{ .Values.httpRoute.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.path | default "/" | quote }}
      {{- if .Values.httpRoute.forwardedHeaders.enabled }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: {{ .Values.httpRoute.forwardedHeaders.proto | quote }}
              - name: X-Forwarded-Host
                value: {{ .Values.httpRoute.forwardedHeaders.host | default .Values.httpRoute.hostname | quote }}
              - name: X-Forwarded-Port
                value: {{ .Values.httpRoute.forwardedHeaders.port | quote }}
              - name: X-Forwarded-Ssl
                value: {{ .Values.httpRoute.forwardedHeaders.ssl | quote }}
      {{- end }}
      backendRefs:
        - kind: Service
          name: {{ include "opencloud.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
