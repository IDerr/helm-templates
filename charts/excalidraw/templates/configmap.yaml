# Non-root nginx: pid + temp paths in /tmp, listen on 8080. Overrides the stock
# nginx config baked into excalidraw/excalidraw (root, port 80).
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "excalidraw.fullname" . }}-nginx
  labels:
    {{- include "excalidraw.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;
    events {
      worker_connections 1024;
    }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      access_log /dev/stdout;
      sendfile on;
      keepalive_timeout 65;
      gzip on;
      gzip_types text/css application/javascript application/json image/svg+xml;
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;
      include /etc/nginx/conf.d/*.conf;
    }
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;
      location / {
        try_files $uri $uri/ /index.html;
      }
      # Content-hashed assets can be cached aggressively.
      location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
      }
    }
