apiVersion: catalog.cloudzero.io/v1
kind: AppDefinition
metadata:
  name: hello-world
  version: 1.0.0
spec:
  display:
    title: Hello World
    summary: Minimal private web app for validating CloudZero marketplace installs.
    productVersion: "1.27-alpine"
    categories:
      - smoke-test
      - web
  source:
    repoURL: https://github.com/IDerr/helm-templates.git
    path: charts/hello-world
    targetRevision: main
  defaults:
    replicaCount: 1
    page:
      title: Hello from CloudZero
      heading: Hello from CloudZero Apps
      body: This private app was installed through the CloudZero marketplace.
      accentColor: "#2563eb"
  install:
    fields:
      - key: pageTitle
        type: string
        label: Browser title
        section: Page
        default: Hello from CloudZero
        required: true
        minLength: 1
        maxLength: 80
      - key: pageHeading
        type: string
        label: Heading
        section: Page
        default: Hello from CloudZero Apps
        required: true
        minLength: 1
        maxLength: 120
      - key: pageBody
        type: string
        label: Body
        section: Page
        default: This private app was installed through the CloudZero marketplace.
        maxLength: 240
      - key: pageAccentColor
        type: string
        label: Accent color
        section: Page
        default: "#2563eb"
        pattern: "^#[0-9a-fA-F]{6}$"
    values:
      - from: fields.pageTitle
        to: page.title
      - from: fields.pageHeading
        to: page.heading
      - from: fields.pageBody
        to: page.body
      - from: fields.pageAccentColor
        to: page.accentColor
  edit:
    fields:
      - key: pageTitle
        type: string
        label: Browser title
        section: Page
        default: Hello from CloudZero
        required: true
        minLength: 1
        maxLength: 80
      - key: pageHeading
        type: string
        label: Heading
        section: Page
        default: Hello from CloudZero Apps
        required: true
        minLength: 1
        maxLength: 120
      - key: pageBody
        type: string
        label: Body
        section: Page
        default: This private app was installed through the CloudZero marketplace.
        maxLength: 240
      - key: pageAccentColor
        type: string
        label: Accent color
        section: Page
        default: "#2563eb"
        pattern: "^#[0-9a-fA-F]{6}$"
    values:
      - from: fields.pageTitle
        to: page.title
      - from: fields.pageHeading
        to: page.heading
      - from: fields.pageBody
        to: page.body
      - from: fields.pageAccentColor
        to: page.accentColor
  requires: []
  wiring: {}
