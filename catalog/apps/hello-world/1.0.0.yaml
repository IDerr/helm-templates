apiVersion: catalog.cloudzero.io/v1
kind: AppDefinition
metadata:
  name: hello-world
  version: 1.0.0
spec:
  display:
    title: Hello World
    summary: Minimal private web app for validating CloudZero marketplace installs.
    categories:
      - smoke-test
      - web
  source:
    repoURL: https://github.com/IDerr/helm-templates.git
    path: charts/hello-world
    targetRevision: main
  defaults:
    replicaCount: 1
    page:
      title: Hello from CloudZero
      heading: Hello from CloudZero Apps
      body: This private app was installed through the CloudZero marketplace.
      accentColor: "#2563eb"
  schema:
    type: object
    properties:
      page:
        type: object
        title: Page
        properties:
          title:
            type: string
            title: Browser title
            default: Hello from CloudZero
            maxLength: 80
          heading:
            type: string
            title: Heading
            default: Hello from CloudZero Apps
            maxLength: 120
          body:
            type: string
            title: Body
            default: This private app was installed through the CloudZero marketplace.
            maxLength: 240
          accentColor:
            type: string
            title: Accent color
            default: "#2563eb"
            pattern: "^#[0-9a-fA-F]{6}$"
  requires: []
  wiring: {}
