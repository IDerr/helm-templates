apiVersion: catalog.cloudzero.io/v1
kind: AppDefinition
metadata:
  name: opencloud
  version: 1.0.0
spec:
  display:
    title: OpenCloud
    summary: Single-container OpenCloud file sharing deployment for marketplace smoke tests.
    productVersion: "2.4"
    categories:
      - collaboration
      - storage
      - web
  source:
    repoURL: https://github.com/IDerr/helm-templates.git
    path: charts/opencloud
    targetRevision: main
  defaults:
    replicaCount: 1
    opencloud:
      adminPassword: admin
      checkForUpdates: false
  install:
    fields:
      # Applied only at first IDM initialization — install-only on purpose:
      # changing them on an existing install has no effect, so they are not
      # offered in the edit form.
      - key: adminPassword
        type: password
        label: Initial admin password
        section: OpenCloud
        default: admin
        required: true
        minLength: 5
        maxLength: 128
      - key: createDemoUsers
        type: boolean
        label: Create demo users
        section: OpenCloud
        default: false
      - key: dataSize
        type: string
        label: Data volume size
        section: Storage
        default: 10Gi
        required: true
        pattern: "^[0-9]+(Mi|Gi)$"
    values:
      - from: fields.adminPassword
        to: opencloud.adminPassword
      - from: fields.createDemoUsers
        to: opencloud.createDemoUsers
      - from: fields.dataSize
        to: persistence.data.size
  edit:
    fields:
      - key: dataSize
        type: string
        label: Data volume size
        section: Storage
        default: 10Gi
        required: true
        pattern: "^[0-9]+(Mi|Gi)$"
    values:
      - from: fields.dataSize
        to: persistence.data.size
  requires: []
  wiring: {}
