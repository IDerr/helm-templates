apiVersion: catalog.cloudzero.io/v1
kind: CatalogIndex
metadata:
  name: cloudzero-apps
spec:
  apps:
    - name: hello-world
      title: Hello World
      summary: Minimal private web app for validating CloudZero marketplace installs.
      categories:
        - smoke-test
        - web
      latestVersion: 1.0.0
      versions:
        - version: 1.0.0
          definition: catalog/apps/hello-world/1.0.0.yaml
    - name: opencloud
      title: OpenCloud
      summary: Single-container OpenCloud file sharing deployment for marketplace smoke tests.
      categories:
        - collaboration
        - storage
        - web
      latestVersion: 1.0.0
      versions:
        - version: 1.0.0
          definition: catalog/apps/opencloud/1.0.0.yaml
    - name: flamenco
      title: Flamenco
      summary: Blender render farm manager with editable CPU worker count and sizing.
      categories:
        - creative
        - render-farm
        - blender
        - web
      latestVersion: 1.0.0
      versions:
        - version: 1.0.0
          definition: catalog/apps/flamenco/1.0.0.yaml
    - name: uptime-kuma
      title: Uptime Kuma
      summary: Beautiful self-hosted uptime monitoring and status pages.
      categories:
        - monitoring
        - observability
        - web
      latestVersion: 1.0.2
      versions:
        - version: 1.0.2
          definition: catalog/apps/uptime-kuma/1.0.2.yaml
        - version: 1.0.1
          definition: catalog/apps/uptime-kuma/1.0.1.yaml
        - version: 1.0.0
          definition: catalog/apps/uptime-kuma/1.0.0.yaml
    - name: excalidraw
      title: Excalidraw
      summary: Virtual whiteboard for sketching hand-drawn like diagrams.
      categories:
        - creative
        - whiteboard
        - web
      latestVersion: 1.0.0
      versions:
        - version: 1.0.0
          definition: catalog/apps/excalidraw/1.0.0.yaml
    - name: openwebui
      title: Open WebUI
      summary: Self-hosted AI chat interface for OpenAI-compatible APIs and Ollama backends.
      categories:
        - ai
        - chat
        - web
      latestVersion: 1.0.0
      versions:
        - version: 1.0.0
          definition: catalog/apps/openwebui/1.0.0.yaml
